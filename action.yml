name: Expo Deploy
description: Build and deploy Expo apps via Fastlane

inputs:
  working-directory:
    description: 'Working directory for run steps'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v6
    - uses: jdx/mise-action@v4
      with:
        cache: false
        mise_toml: |
          [tools]
          java = "17"
          node = "24"
          ruby = "3.4"
          "gem:fastlane" = "latest"
    - run: npm ci
      shell: bash
      working-directory: ${{ inputs.working-directory }}
    - run: fastlane deploy
      shell: bash
      working-directory: ${{ inputs.working-directory }}
