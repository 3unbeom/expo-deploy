name: Expo Deploy
description: Build and deploy Expo apps via Fastlane

inputs:
  working-directory:
    description: 'Working directory for run steps'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - run: |
        npm ci
        doppler setup -p flutter-deploy -c prd --no-interactive
        doppler run -- fastlane deploy
      shell: bash
      working-directory: ${{ inputs.working-directory }}
