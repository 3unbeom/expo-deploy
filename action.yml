name: Expo Deploy
description: Build and deploy Expo apps via Fastlane

inputs:
  working-directory:
    description: 'Working directory for run steps'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - run: |
        mkdir -p fastlane
        cp ${{ github.action_path }}/fastlane/Fastfile fastlane
        doppler run -p deploy -c prd -- fastlane deploy
      shell: bash
      working-directory: ${{ inputs.working-directory }}
