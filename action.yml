name: Expo Deploy
description: Build and deploy Expo apps via Fastlane

inputs:
  working-directory:
    description: 'Working directory for run steps'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - uses: jdx/mise-action@v4
      with:
        cache: false
        mise_toml: |
          [tools]
          java = "17"
          node = "24"
          ruby = "3.4"
          "gem:fastlane" = "latest"
    - run: |
        rm -rf "${{ inputs.working-directory }}/fastlane"
        cp -r "${{ github.action_path }}/fastlane" "${{ inputs.working-directory }}/fastlane"
        echo "=== fastlane dir ==="
        ls -la "${{ inputs.working-directory }}/fastlane/"
        echo "=== pwd ==="
        pwd
      shell: bash
    - run: npm ci
      shell: bash
      working-directory: ${{ inputs.working-directory }}
    - run: fastlane deploy
      shell: bash
      working-directory: ${{ inputs.working-directory }}
